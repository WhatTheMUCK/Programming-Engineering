components_manager:
    coro_pool:
        initial_size: 500
        max_size: 1000

    task_processors:
        main-task-processor:
            worker_threads: 4
            thread_name: main-worker
        fs-task-processor:
            worker_threads: 2
            thread_name: fs-worker

    default_task_processor: main-task-processor

    components:
        server:
            listener:
                port: 8083
                task_processor: main-task-processor
            listener-monitor:
                port: 9093
                task_processor: main-task-processor
        logging:
            fs-task-processor: fs-task-processor
            loggers:
                default:
                    file_path: '@stderr'
                    level: debug
                    overflow_behavior: discard

        testsuite-support: {}

        dns-client:
            fs-task-processor: fs-task-processor

        mongo-db: {}

        jwt-auth-checker:
            secret: your-secret-key-change-in-production

        handler-ping:
            path: /ping
            method: GET
            task_processor: main-task-processor
            throttling_enabled: false
            url_trailing_slash: strict-match

        handler-server-monitor:
            path: /metrics
            method: GET
            task_processor: main-task-processor

        handler-create-message:
            path: /api/v1/folders/{folderId}/messages
            method: POST
            task_processor: main-task-processor
            auth:
                types:
                    - jwt-auth

        handler-list-messages:
            path: /api/v1/folders/{folderId}/messages
            method: GET
            task_processor: main-task-processor
            auth:
                types:
                    - jwt-auth

        handler-get-message:
            path: /api/v1/messages/{messageId}
            method: GET
            task_processor: main-task-processor
            auth:
                types:
                    - jwt-auth
