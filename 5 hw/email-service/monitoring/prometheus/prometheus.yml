global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'email-service'
    environment: 'development'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  # - "alerts/*.yml"

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # MongoDB Exporter - Database metrics
  - job_name: 'mongodb-exporter'
    static_configs:
      - targets: ['mongodb-exporter:9216']

  # User Service
  - job_name: 'user-service'
    metrics_path: '/metrics'
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['user-service:9091']
        labels:
          service: 'user-service'

  # Folder Service
  - job_name: 'folder-service'
    metrics_path: '/metrics'
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['folder-service:9092']
        labels:
          service: 'folder-service'

  # Message Service
  - job_name: 'message-service'
    metrics_path: '/metrics'
    params:
      format: ['prometheus']
    static_configs:
      - targets: ['message-service:9093']
        labels:
          service: 'message-service'

  # Nginx Exporter
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']

  # Cache and Rate Limiting Metrics
  - job_name: 'cache-rate-limiting'
    metrics_path: '/cache-rate-limiting-metrics'
    fallback_scrape_protocol: 'PrometheusText0.0.4'
    static_configs:
      - targets: ['user-service:8081']
        labels:
          service: 'user-service'
          metrics_type: 'cache-rate-limiting'
