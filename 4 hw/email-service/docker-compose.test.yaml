services:
  postgres-test:
    image: postgres:16-alpine
    container_name: email-postgres-test
    environment:
      POSTGRES_DB: email_test_db
      POSTGRES_USER: email_user
      POSTGRES_PASSWORD: email_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email_user -d email_test_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - email-network
    restart: unless-stopped

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-user-service-test
    command: ["/app/email-service-user", "--config", "/app/configs/static_config_user_test.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./configs/static_config_user_test.yaml:/app/configs/static_config_user_test.yaml:ro
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email-network
    restart: unless-stopped

  folder-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-folder-service-test
    command: ["/app/email-service-folder", "--config", "/app/configs/static_config_folder_test.yaml"]
    ports:
      - "8082:8082"
    volumes:
      - ./configs/static_config_folder_test.yaml:/app/configs/static_config_folder_test.yaml:ro
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email-network
    restart: unless-stopped

  message-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-message-service-test
    command: ["/app/email-service-message", "--config", "/app/configs/static_config_message_test.yaml"]
    ports:
      - "8083:8083"
    volumes:
      - ./configs/static_config_message_test.yaml:/app/configs/static_config_message_test.yaml:ro
    depends_on:
      postgres-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: email-nginx-test
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./swagger:/usr/share/nginx/html/swagger:ro
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - user-service
      - folder-service
      - message-service
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - email-network
    restart: unless-stopped

networks:
  email-network:
    driver: bridge

volumes:
  postgres_test_data:
