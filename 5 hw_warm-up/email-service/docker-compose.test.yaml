services:
  mongo-test:
    image: mongo:7.0
    container_name: email-mongo-test
    environment:
      MONGO_INITDB_DATABASE: email_test_db
    ports:
      - "27018:27017"
    volumes:
      - ./init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - email-network

  user-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-user-service-test
    command: ["/bin/sh", "-lc", "export MONGO_URI='mongodb://mongo-test:27017/email_test_db' && /app/email-service-user --config /app/configs/static_config_user_test.yaml"]
    ports:
      - "18081:8081"
    volumes:
      - ./configs/static_config_user_test.yaml:/app/configs/static_config_user_test.yaml:ro
    depends_on:
      mongo-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - email-network

  folder-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-folder-service-test
    command: ["/bin/sh", "-lc", "export MONGO_URI='mongodb://mongo-test:27017/email_test_db' && /app/email-service-folder --config /app/configs/static_config_folder_test.yaml"]
    ports:
      - "18082:8082"
    volumes:
      - ./configs/static_config_folder_test.yaml:/app/configs/static_config_folder_test.yaml:ro
    depends_on:
      mongo-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - email-network

  message-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-message-service-test
    command: ["/bin/sh", "-lc", "export MONGO_URI='mongodb://mongo-test:27017/email_test_db' && /app/email-service-message --config /app/configs/static_config_message_test.yaml"]
    ports:
      - "18083:8083"
    volumes:
      - ./configs/static_config_message_test.yaml:/app/configs/static_config_message_test.yaml:ro
    depends_on:
      mongo-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - email-network

  nginx-test:
    image: nginx:alpine
    container_name: email-nginx-test
    ports:
      - "18080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./swagger:/usr/share/nginx/html/swagger:ro
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      user-service:
        condition: service_healthy
      folder-service:
        condition: service_healthy
      message-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:80/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - email-network

networks:
  email-network:
    driver: bridge

