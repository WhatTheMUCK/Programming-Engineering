services:
  user-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-user-service
    command: ["/app/email-service-user", "--config", "/app/configs/static_config_user.yaml"]
    ports:
      - "8081:8081"
    volumes:
      - ./data:/app/data
      - ./configs/static_config_user.yaml:/app/configs/static_config_user.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email-network
    restart: unless-stopped

  folder-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-folder-service
    command: ["/app/email-service-folder", "--config", "/app/configs/static_config_folder.yaml"]
    ports:
      - "8082:8082"
    volumes:
      - ./data:/app/data
      - ./configs/static_config_folder.yaml:/app/configs/static_config_folder.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email-network
    restart: unless-stopped

  message-service:
    platform: linux/amd64
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-message-service
    command: ["/app/email-service-message", "--config", "/app/configs/static_config_message.yaml"]
    ports:
      - "8083:8083"
    volumes:
      - ./data:/app/data
      - ./configs/static_config_message.yaml:/app/configs/static_config_message.yaml:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8083/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - email-network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: email-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./swagger:/usr/share/nginx/html/swagger:ro
      - ./openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro
    depends_on:
      - user-service
      - folder-service
      - message-service
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - email-network
    restart: unless-stopped

networks:
  email-network:
    driver: bridge

volumes:
  postgres_data:
